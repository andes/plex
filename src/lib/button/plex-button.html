<ng-container *ngIf="type">
    <button plexRipples style="pointer-events: auto" class="btn btn-{{ type }} {{ (size ? 'btn-' + size : '') }}"
        [disabled]="disabled">
        <i *ngIf="icon" class="mdi mdi-{{ icon }}" style="pointer-events: none"></i>
        <span *ngIf="label" style="pointer-events: none"> {{ label }} </span>
        <ng-content *ngIf="!icon && !label"></ng-content>
        <plex-loader *ngIf="showLoader" type="linear"></plex-loader>
    </button>
</ng-container>
